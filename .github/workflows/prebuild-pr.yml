name: Prebuild Binaries

on:
  pull_request:

jobs:
  prebuild-windows:
    name: Prebuild Binaries for Windows x64
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
      - uses: actions/checkout@v6
      - run: npm i
      - name: Prebuild
        run: npm run prebuild -- --strip --all --arch x64

  prebuild-windows-32:
    name: Prebuild Binaries for Windows ia32
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
      - uses: actions/checkout@v6
      - run: npm i
      - name: Prebuild
        run: npm run prebuild -- --strip --all --arch ia32
