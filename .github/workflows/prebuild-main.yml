name: Prebuild Binaries and Publish

on:
  push:
    branches:
      - main

jobs:
  prebuild-windows:
    name: Prebuild Binaries for Windows x64
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
      - uses: actions/checkout@v6
      - run: npm i
      - name: Prebuild Node
        run: >-
          npm run prebuild -- --strip --arch x64 -r node
          -t 22.0.0
          -t 24.0.0
          -t 26.0.0
          -u ${{ secrets.PREBUILD_TOKEN }}
      - name: Prebuild Electron
        run: >-
          npm run prebuild -- --strip --arch x64 -r electron
          -t 29.4.6
          -t 31.7.7
          -t 32.3.3
          -t 33.4.11
          -t 34.5.8
          -t 35.7.5
          -t 36.9.5
          -t 37.10.3
          -t 38.8.6
          -t 39.8.10
          -t 40.10.6
          -t 41.9.2
          -t 42.5.2
          -t 43.0.0
          -u ${{ secrets.PREBUILD_TOKEN }}

  prebuild-windows-32:
    name: Prebuild Binaries for Windows ia32
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
      - uses: actions/checkout@v6
      - run: npm i
      - name: Prebuild Node
        run: >-
          npm run prebuild -- --strip --arch ia32 -r node
          -t 22.0.0
          -u ${{ secrets.PREBUILD_TOKEN }}
      - name: Prebuild Electron
        run: >-
          npm run prebuild -- --strip --arch ia32 -r electron
          -t 29.4.6
          -t 31.7.7
          -t 32.3.3
          -t 33.4.11
          -t 34.5.8
          -t 35.7.5
          -t 36.9.5
          -t 37.10.3
          -t 38.8.6
          -t 39.8.10
          -t 40.10.6
          -t 41.9.2
          -t 42.5.2
          -t 43.0.0
          -u ${{ secrets.PREBUILD_TOKEN }}
